name: Tests

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  unit_tests:
    name: unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rev: [nightly, stable]
        include:
          - os: ubuntu-latest
            install-deps: sudo apt-get update && sudo apt-get install -y ripgrep && curl -L "$(curl -s https://api.github.com/repos/tree-sitter/tree-sitter/releases/latest | grep -o 'https://[^"]*tree-sitter-cli-linux-x64[^"]*\.gz')" | gunzip > /tmp/tree-sitter && chmod +x /tmp/tree-sitter && sudo mv /tmp/tree-sitter /usr/local/bin/
          - os: macos-latest
            install-deps: brew update && brew install ripgrep tree-sitter-cli

    steps:
      - uses: actions/checkout@v5

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.rev }}

      - name: Prepare
        shell: bash
        run: |
          ${{ matrix.install-deps }}
          XDG_DATA_DIR="$HOME/.local/share/nvim-data"
          echo "XDG_DATA_HOME=$XDG_DATA_DIR" >> $GITHUB_ENV
          echo "HOST_XDG_DATA_HOME=$XDG_DATA_DIR" >> $GITHUB_ENV
          git clone https://github.com/nvim-lua/plenary.nvim ../plenary.nvim
          git clone https://github.com/nvim-treesitter/nvim-treesitter ../nvim-treesitter

      - name: Run tests
        shell: bash
        run: |
          nvim --version
          make test
