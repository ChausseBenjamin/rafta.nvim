name: Tests

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  unit_tests:
    name: unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rev: [nightly, stable]
        include:
          - os: ubuntu-latest
            install-deps: sudo apt-get update && sudo apt-get install -y ripgrep && sudo apt-get install -y nodejs npm && npm install -g tree-sitter-cli
          - os: macos-latest
            install-deps: brew update && brew install ripgrep && brew install node && npm install -g tree-sitter-cli
          - os: windows-latest
            install-deps: choco install ripgrep && choco install nodejs && npm install -g tree-sitter-cli && choco install make

    steps:
      - uses: actions/checkout@v5

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.rev }}

      - name: Prepare
        shell: bash
        run: |
          ${{ matrix.install-deps }}
          if [ "$RUNNER_OS" = "Windows" ]; then
            XDG_DATA_DIR="$APPDATA/Local/nvim-data"
          else
            XDG_DATA_DIR="$HOME/.local/share/nvim-data"
          fi
          echo "XDG_DATA_HOME=$XDG_DATA_DIR" >> $GITHUB_ENV
          echo "HOST_XDG_DATA_HOME=$XDG_DATA_DIR" >> $GITHUB_ENV
          git clone https://github.com/nvim-lua/plenary.nvim ../plenary.nvim
          git clone https://github.com/nvim-treesitter/nvim-treesitter ../nvim-treesitter

      - name: Run tests
        shell: bash
        run: |
          nvim --version
          make test
